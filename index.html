<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeGaXi - Seguimiento de Fantasmas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #2c2c2a;
            padding: 16px;
            line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 22px; font-weight: 500; color: #2c2c2a; }
        .header p { font-size: 13px; color: #5f5e5a; margin-top: 4px; }
        
        /* Botones */
        .btn {
            padding: 8px 16px;
            border: 0.5px solid rgba(0,0,0,0.3);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #2c2c2a;
            transition: all 0.15s;
        }
        .btn:hover { background: #f1efe8; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: #185fa5;
            color: white;
            border-color: #185fa5;
        }
        .btn-primary:hover { background: #0c447c; }
        .btn-danger {
            background: #fff;
            color: #a32d2d;
            border-color: #a32d2d;
        }
        .btn-danger:hover { background: #fcebeb; }
        
        /* Stats cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 14px 16px;
            border: 0.5px solid rgba(0,0,0,0.15);
        }
        .stat-card.activo { background: #EAF3DE; border-color: #97C459; }
        .stat-card.tibio { background: #FAEEDA; border-color: #EF9F27; }
        .stat-card.frio { background: #FCEBEB; border-color: #F09595; }
        .stat-label { font-size: 12px; color: #5f5e5a; margin-bottom: 4px; }
        .stat-card.activo .stat-label { color: #3B6D11; }
        .stat-card.tibio .stat-label { color: #854F0B; }
        .stat-card.frio .stat-label { color: #A32D2D; }
        .stat-value { font-size: 26px; font-weight: 500; }
        .stat-card.activo .stat-value { color: #173404; }
        .stat-card.tibio .stat-value { color: #412402; }
        .stat-card.frio .stat-value { color: #501313; }
        .stat-sub { font-size: 11px; color: #5f5e5a; margin-top: 4px; }
        .stat-card.activo .stat-sub { color: #3B6D11; }
        .stat-card.tibio .stat-sub { color: #854F0B; }
        .stat-card.frio .stat-sub { color: #A32D2D; }
        
        /* Filtros */
        .filtros {
            background: white;
            border: 0.5px solid rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filtros input, .filtros select {
            padding: 8px 12px;
            border: 0.5px solid rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 14px;
            background: white;
            color: #2c2c2a;
            font-family: inherit;
        }
        .filtros input:focus, .filtros select:focus {
            outline: none;
            border-color: #185fa5;
            box-shadow: 0 0 0 2px rgba(24, 95, 165, 0.15);
        }
        .filtros input[type="text"] { flex: 1; min-width: 200px; }
        .filtros select { min-width: 140px; }
        
        /* Tabla */
        .tabla-wrapper {
            background: white;
            border: 0.5px solid rgba(0,0,0,0.15);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .tabla-scroll { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f1efe8; }
        th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 500;
            color: #2c2c2a;
            border-bottom: 0.5px solid rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        td {
            padding: 10px 12px;
            border-bottom: 0.5px solid rgba(0,0,0,0.08);
            vertical-align: middle;
        }
        tbody tr:hover { background: #fafaf5; }
        tbody tr.selected { background: #e6f1fb; }
        .text-right { text-align: right; }
        .mono { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 12px; }
        
        /* Categoría badges */
        .cat {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            display: inline-block;
        }
        .cat-ACTIVO { background: #EAF3DE; color: #173404; }
        .cat-TIBIO { background: #FAEEDA; color: #412402; }
        .cat-FRIO { background: #FCEBEB; color: #501313; }
        
        .pct-ACTIVO { color: #173404; font-weight: 500; }
        .pct-TIBIO { color: #854F0B; font-weight: 500; }
        .pct-FRIO { color: #A32D2D; font-weight: 500; }
        
        /* Estados */
        .loading {
            text-align: center;
            padding: 40px;
            color: #5f5e5a;
            font-size: 14px;
        }
        .error {
            background: #FCEBEB;
            border: 0.5px solid #F09595;
            color: #501313;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #888780;
            font-size: 14px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c2c2a;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #0F6E56; }
        .toast.error { background: #791F1F; }
        
        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #888780;
            margin-top: 16px;
        }
        
        /* Selection bar */
        .selection-bar {
            background: #185fa5;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: none;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .selection-bar.show { display: flex; }
        .selection-bar .btn {
            background: white;
            color: #185fa5;
        }
        .selection-bar .btn:hover { background: #f1efe8; }
        
        .checkbox-cell { width: 32px; }
        input[type="checkbox"] { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h1>Seguimiento de fantasmas</h1>
            <p id="header-sub">Clientes sin contacto en 10+ días</p>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn" id="btn-refresh" onclick="cargarDatos()">Refrescar</button>
            <button class="btn" onclick="verEnFlujo()">Ver en flujo</button>
        </div>
    </div>

    <div id="error-box"></div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-label">Total fantasmas</div>
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-sub" id="stat-total-sub">cargando...</div>
        </div>
        <div class="stat-card activo">
            <div class="stat-label">Activos · &gt;50% pagado</div>
            <div class="stat-value" id="stat-activo">—</div>
            <div class="stat-sub" id="stat-activo-sub">—</div>
        </div>
        <div class="stat-card tibio">
            <div class="stat-label">Tibios · 1-50% pagado</div>
            <div class="stat-value" id="stat-tibio">—</div>
            <div class="stat-sub" id="stat-tibio-sub">—</div>
        </div>
        <div class="stat-card frio">
            <div class="stat-label">Fríos · 0% pagado</div>
            <div class="stat-value" id="stat-frio">—</div>
            <div class="stat-sub" id="stat-frio-sub">—</div>
        </div>
    </div>

    <div class="filtros">
        <input type="text" id="filtro-buscar" placeholder="Buscar por nombre o teléfono..." />
        <select id="filtro-categoria">
            <option value="">Todas categorías</option>
            <option value="ACTIVO">Solo activos</option>
            <option value="TIBIO">Solo tibios</option>
            <option value="ACTIVO,TIBIO">Activos + Tibios (recomendado)</option>
            <option value="FRIO">Solo fríos</option>
        </select>
        <select id="filtro-promotor">
            <option value="">Todos los promotores</option>
        </select>
        <select id="filtro-saldo">
            <option value="0">Cualquier saldo</option>
            <option value="1000">Saldo &gt; $1,000</option>
            <option value="5000">Saldo &gt; $5,000</option>
            <option value="10000">Saldo &gt; $10,000</option>
            <option value="20000">Saldo &gt; $20,000</option>
        </select>
    </div>

    <div class="selection-bar" id="selection-bar">
        <span><strong id="selection-count">0</strong> clientes seleccionados</span>
        <div style="display: flex; gap: 8px;">
            <button class="btn" onclick="limpiarSeleccion()">Limpiar</button>
            <button class="btn" onclick="marcarSeleccionados()">Marcar para seguimiento →</button>
        </div>
    </div>

    <div class="tabla-wrapper">
        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" id="check-all" onclick="toggleAll(this)" /></th>
                        <th>Cat</th>
                        <th>Cliente</th>
                        <th>Teléfono</th>
                        <th class="text-right">Saldo</th>
                        <th class="text-right">Original</th>
                        <th class="text-right">% pag</th>
                        <th class="text-right">Atraso</th>
                        <th>Promotor</th>
                        <th>Último contacto</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="10" class="loading">Cargando datos del detector...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer" id="footer">—</div>

</div>

<div class="toast" id="toast"></div>

<script>
    let allFantasmas = [];
    let filtered = [];
    let selectedTelefonos = new Set();
    
    // Formato dinero
    function fmt(n) {
        return '$' + Math.round(n).toLocaleString('es-MX');
    }
    
    function showToast(msg, tipo = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + tipo;
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    function showError(msg) {
        const e = document.getElementById('error-box');
        e.innerHTML = '<div class="error">⚠️ ' + msg + '</div>';
    }
    
    function clearError() {
        document.getElementById('error-box').innerHTML = '';
    }
    
    async function cargarDatos() {
        const btn = document.getElementById('btn-refresh');
        btn.disabled = true;
        btn.textContent = 'Cargando...';
        clearError();
        document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="loading">Detectando fantasmas, por favor espera...</td></tr>';
        
        try {
            const res = await fetch('/api/detectar');
            const data = await res.json();
            
            if (!data.success) {
                showError('Error al cargar: ' + (data.error || 'desconocido'));
                btn.disabled = false;
                btn.textContent = 'Refrescar';
                return;
            }
            
            allFantasmas = data.fantasmas || [];
            
            // Stats
            document.getElementById('stat-total').textContent = data.stats.fantasmas;
            document.getElementById('stat-total-sub').textContent = `de ${data.stats.totalClientes} en cartera`;
            document.getElementById('stat-activo').textContent = data.stats.porCategoria.ACTIVO;
            document.getElementById('stat-activo-sub').textContent = fmt(data.montosPorCategoria.ACTIVO) + ' recuperable';
            document.getElementById('stat-tibio').textContent = data.stats.porCategoria.TIBIO;
            document.getElementById('stat-tibio-sub').textContent = fmt(data.montosPorCategoria.TIBIO) + ' recuperable';
            document.getElementById('stat-frio').textContent = data.stats.porCategoria.FRIO;
            document.getElementById('stat-frio-sub').textContent = fmt(data.montosPorCategoria.FRIO) + ' nominal';
            
            // Update header con dias_sin_contacto real
            document.getElementById('header-sub').textContent = `Clientes sin contacto en ${data.config.diasSinContacto}+ días`;
            
            // Llenar dropdown de promotores
            const promotores = [...new Set(allFantasmas.map(f => f.promotor).filter(p => p))].sort();
            const sel = document.getElementById('filtro-promotor');
            sel.innerHTML = '<option value="">Todos los promotores</option>';
            promotores.forEach(p => {
                const o = document.createElement('option');
                o.value = p;
                o.textContent = p.length > 50 ? p.substring(0, 47) + '...' : p;
                sel.appendChild(o);
            });
            
            aplicarFiltros();
            
        } catch (err) {
            showError('Error de conexión: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = 'Refrescar';
        }
    }
    
    function aplicarFiltros() {
        const buscar = document.getElementById('filtro-buscar').value.toLowerCase().trim();
        const cat = document.getElementById('filtro-categoria').value;
        const promotor = document.getElementById('filtro-promotor').value;
        const saldoMin = parseFloat(document.getElementById('filtro-saldo').value) || 0;
        
        const cats = cat ? cat.split(',') : null;
        
        filtered = allFantasmas.filter(f => {
            if (cats && !cats.includes(f.categoria)) return false;
            if (promotor && f.promotor !== promotor) return false;
            if (f.saldo < saldoMin) return false;
            if (buscar) {
                const haystack = (f.cliente + ' ' + f.telefono).toLowerCase();
                if (!haystack.includes(buscar)) return false;
            }
            return true;
        });
        
        renderTabla();
    }
    
    function renderTabla() {
        const tbody = document.getElementById('tbody');
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty">No hay fantasmas que coincidan con los filtros</td></tr>';
            document.getElementById('footer').textContent = `Mostrando 0 de ${allFantasmas.length} fantasmas`;
            return;
        }
        
        // Limitar a 200 visibles para no matar el navegador
        const limit = 200;
        const visibles = filtered.slice(0, limit);
        
        tbody.innerHTML = visibles.map(f => {
            const isSel = selectedTelefonos.has(f.telefono);
            const ult = f.ultimoContacto.dias !== null
                ? `${f.ultimoContacto.tipo} hace ${f.ultimoContacto.dias}d`
                : (f.ultimoContacto.tipo === 'pago_historico' ? 'pagó algo (sin fecha)' : 'nunca');
            return `
                <tr class="${isSel ? 'selected' : ''}" data-tel="${f.telefono}">
                    <td class="checkbox-cell">
                        <input type="checkbox" ${isSel ? 'checked' : ''} onclick="toggleSeleccion('${f.telefono}', this)" />
                    </td>
                    <td><span class="cat cat-${f.categoria}">${f.categoria}</span></td>
                    <td>${escapeHtml(f.cliente)}</td>
                    <td class="mono">${f.telefono}</td>
                    <td class="text-right">${fmt(f.saldo)}</td>
                    <td class="text-right" style="color:#888780;font-size:12px">${fmt(f.saldoOriginal)}</td>
                    <td class="text-right pct-${f.categoria}">${f.porcentajeAvance}%</td>
                    <td class="text-right">${f.diasAtraso}d</td>
                    <td style="font-size:11px;color:#5f5e5a">${escapeHtml((f.promotor || '').substring(0, 28))}</td>
                    <td style="font-size:11px;color:#5f5e5a">${ult}</td>
                </tr>
            `;
        }).join('');
        
        const truncado = filtered.length > limit ? ` (mostrando primeros ${limit})` : '';
        document.getElementById('footer').textContent = `Mostrando ${visibles.length} de ${filtered.length} filtrados (de ${allFantasmas.length} totales)${truncado}`;
    }
    
    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({
            '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[c]);
    }
    
    function toggleSeleccion(tel, cb) {
        if (cb.checked) selectedTelefonos.add(tel);
        else selectedTelefonos.delete(tel);
        actualizarBarraSeleccion();
        const tr = cb.closest('tr');
        if (cb.checked) tr.classList.add('selected');
        else tr.classList.remove('selected');
    }
    
    function toggleAll(cb) {
        const checkboxes = document.querySelectorAll('#tbody input[type="checkbox"]');
        checkboxes.forEach(c => {
            c.checked = cb.checked;
            const tel = c.closest('tr').dataset.tel;
            if (cb.checked) selectedTelefonos.add(tel);
            else selectedTelefonos.delete(tel);
            const tr = c.closest('tr');
            if (cb.checked) tr.classList.add('selected');
            else tr.classList.remove('selected');
        });
        actualizarBarraSeleccion();
    }
    
    function limpiarSeleccion() {
        selectedTelefonos.clear();
        document.querySelectorAll('#tbody input[type="checkbox"]').forEach(c => {
            c.checked = false;
            c.closest('tr').classList.remove('selected');
        });
        document.getElementById('check-all').checked = false;
        actualizarBarraSeleccion();
    }
    
    function actualizarBarraSeleccion() {
        const bar = document.getElementById('selection-bar');
        const count = selectedTelefonos.size;
        document.getElementById('selection-count').textContent = count;
        if (count > 0) bar.classList.add('show');
        else bar.classList.remove('show');
    }
    
    async function marcarSeleccionados() {
        if (selectedTelefonos.size === 0) {
            showToast('No hay clientes seleccionados', 'error');
            return;
        }
        
        if (!confirm(`¿Marcar ${selectedTelefonos.size} clientes para seguimiento?\n\nEsto los registra en la base de datos pero NO envía mensajes todavía.`)) {
            return;
        }
        
        const seleccionados = allFantasmas.filter(f => selectedTelefonos.has(f.telefono));
        
        try {
            const res = await fetch('/api/marcar-seguimiento', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientes: seleccionados })
            });
            const data = await res.json();
            
            if (!data.success) {
                showToast('Error: ' + data.error, 'error');
                return;
            }
            
            showToast(`✓ ${data.insertados} marcados (${data.saltados} ya estaban, ${data.errores} errores)`, 'success');
            limpiarSeleccion();
            
            // Recargar para que aparezcan como "ya en flujo" y se filtren
            setTimeout(() => cargarDatos(), 1000);
            
        } catch (err) {
            showToast('Error de red: ' + err.message, 'error');
        }
    }
    
    async function verEnFlujo() {
        try {
            const res = await fetch('/api/estado-seguimiento');
            const data = await res.json();
            
            if (!data.success) {
                alert('Error: ' + data.error);
                return;
            }
            
            if (data.total === 0) {
                alert('No hay clientes en flujo de seguimiento todavía');
                return;
            }
            
            const lista = data.clientes.map(c => 
                `${c.telefono} - ${c.cliente_nombre} ($${Math.round(c.saldo).toLocaleString()}) - ${c.estado} paso ${c.paso_actual}`
            ).join('\n');
            
            alert(`${data.total} clientes en flujo:\n\n${lista}`);
            
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }
    
    // Filtros con debounce
    let timer;
    ['filtro-buscar', 'filtro-categoria', 'filtro-promotor', 'filtro-saldo'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(aplicarFiltros, 200);
        });
    });
    
    // Cargar al arrancar
    cargarDatos();
</script>

</body>
</html>
